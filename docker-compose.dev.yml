# Local development override. Layer it on the base stack:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up postgres app
#
# It publishes Postgres on localhost (so the test suite / a host-side uvicorn can
# reach it), mounts the source for live reload, and supplies throwaway dev
# credentials so you don't need a populated .env. nginx is intentionally not
# started in dev (run the two named services only, as above).
services:
  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: iceberg_ebs
      POSTGRES_USER: iceberg_ebs
      POSTGRES_PASSWORD: iceberg_ebs

  app:
    build: .
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    environment:
      ICEBERG_EBS_DATABASE_URL: postgresql+asyncpg://iceberg_ebs:iceberg_ebs@postgres:5432/iceberg_ebs
      ICEBERG_EBS_ADMIN_USERNAME: ${ICEBERG_EBS_ADMIN_USERNAME:-admin}
      ICEBERG_EBS_ADMIN_PASSWORD: ${ICEBERG_EBS_ADMIN_PASSWORD:-admin}
      ICEBERG_EBS_SECRET_KEY: ${ICEBERG_EBS_SECRET_KEY:-dev-secret-key-not-for-production-use-only}
      ICEBERG_EBS_SECURE_COOKIES: "false"
