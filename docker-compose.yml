# Pin the Compose project name. Without it the project (and therefore container and
# volume names) is derived from the working directory, which is not necessarily
# named after the app.
name: iceberg-ebs

services:
  postgres:
    image: postgres:16-alpine
    # Postgres' entrypoint needs its default caps to chown PGDATA and drop to the
    # postgres user, so caps are NOT dropped here; just block privilege escalation.
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iceberg_ebs}
      POSTGRES_USER: ${POSTGRES_USER:-iceberg_ebs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iceberg_ebs} -d ${POSTGRES_DB:-iceberg_ebs}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    # The app parses untrusted extension archives, so give it the tightest sandbox
    # Compose offers: no privilege escalation, no Linux capabilities, and a read-only
    # root filesystem. The image already runs as the non-root `appuser` (see Dockerfile)
    # and writes nothing outside /tmp, so a writable tmpfs there is all it needs.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      ICEBERG_EBS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-iceberg_ebs}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-iceberg_ebs}
      ICEBERG_EBS_ADMIN_USERNAME: ${ICEBERG_EBS_ADMIN_USERNAME}
      ICEBERG_EBS_ADMIN_PASSWORD: ${ICEBERG_EBS_ADMIN_PASSWORD}
      ICEBERG_EBS_SECRET_KEY: ${ICEBERG_EBS_SECRET_KEY}
      ICEBERG_EBS_APP_BASE_URL: ${ICEBERG_EBS_APP_BASE_URL:-}
      ICEBERG_EBS_SECURE_COOKIES: "true"
      # Don't attempt to write .pyc into the read-only /app tree.
      PYTHONDONTWRITEBYTECODE: "1"
    healthcheck:
      # python:3.14-slim has no curl/wget — probe /readyz via the stdlib. urlopen
      # raises on a non-2xx (e.g. 503 when the DB is down), which fails the check.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz', timeout=5)"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    # Pinned to a minor: `nginx:alpine` floats, so the TLS-terminating proxy
    # would silently change version on every `docker compose pull`.
    image: nginx:1.29-alpine
    security_opt:
      - no-new-privileges:true
    # cap_drop ALL, then add back only what the stock nginx image needs under a
    # read-only rootfs: NET_BIND_SERVICE to bind :80/:443, and CHOWN/SETUID/SETGID/
    # DAC_OVERRIDE for the root master to drop its workers to the `nginx` user.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    read_only: true
    # nginx writes its pid and proxy temp files; back those with tmpfs so the rest of
    # the root filesystem stays read-only. Do NOT tmpfs /var/log/nginx — the official
    # image symlinks access.log/error.log to /dev/stdout|stderr (which stay writable
    # under a read-only rootfs), and a tmpfs there would shadow those symlinks so nginx
    # writes real files no one collects, swallowing container logs.
    tmpfs:
      - /var/cache/nginx
      - /var/run
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/security_headers.conf:/etc/nginx/security_headers.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./static:/app/static:ro
    healthcheck:
      # Plain-HTTP nginx-local liveness on :80 (returns 200 without redirecting to
      # HTTPS or proxying to the app — see the /nginx-health location in nginx.conf).
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/nginx-health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
