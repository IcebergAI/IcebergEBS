{% extends "base.html" %}
{% block title %}Marvin — Admin: Users{% endblock %}
{% block nav_admin %}active{% endblock %}

{% block content %}
<div x-data="userAdmin()">

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
  <h1 style="font-size:1rem;color:var(--gb-fg4);font-weight:400;margin:0">
    <span style="color:var(--gb-yellow-b)">admin</span>
    <span style="color:var(--gb-bg3);margin:0 6px">/</span>
    <span>users</span>
  </h1>
  <button class="btn btn-primary" @click="showCreate = !showCreate">+ new user</button>
</div>

<!-- Create user form -->
<div class="card" x-show="showCreate" x-cloak style="max-width:480px;margin-bottom:20px">
  <div class="section-title">create user</div>
  <div style="display:flex;flex-direction:column;gap:12px">
    <div>
      <label style="display:block;font-size:0.72rem;color:var(--gb-fg4);margin-bottom:4px">USERNAME</label>
      <input type="text" x-model="form.username" placeholder="username" @keydown.enter="createUser()">
    </div>
    <div>
      <label style="display:block;font-size:0.72rem;color:var(--gb-fg4);margin-bottom:4px">PASSWORD</label>
      <input type="password" x-model="form.password" placeholder="password" @keydown.enter="createUser()">
    </div>
    <div>
      <label style="display:block;font-size:0.72rem;color:var(--gb-fg4);margin-bottom:4px">EMAIL <span style="color:var(--gb-bg3)">(optional)</span></label>
      <input type="text" x-model="form.email" placeholder="user@example.com" @keydown.enter="createUser()">
    </div>
    <div>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.85rem">
        <input type="checkbox" x-model="form.is_admin">
        <span>admin privileges</span>
      </label>
    </div>
    <div x-show="createError" style="color:var(--gb-red-b);font-size:0.8rem" x-text="createError"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" @click="createUser()" :disabled="creating">
        <span x-show="!creating">create</span>
        <span x-show="creating">creating...</span>
      </button>
      <button class="btn btn-ghost" @click="showCreate = false; resetForm()">cancel</button>
    </div>
  </div>
</div>

<!-- Users table -->
<table>
  <thead>
    <tr>
      <th>username</th>
      <th>email</th>
      <th>role</th>
      <th>created</th>
      <th>actions</th>
    </tr>
  </thead>
  <tbody>
    <template x-for="u in users" :key="u.id">
      <tr>
        <td>
          <span x-text="u.username" style="color:var(--gb-fg2);font-weight:500"></span>
          <span x-show="u.id === currentUserId" style="color:var(--gb-fg4);font-size:0.72rem"> (you)</span>
        </td>
        <td style="color:var(--gb-fg4);font-size:0.8rem" x-text="u.email || '—'"></td>
        <td>
          <span x-show="u.is_admin" class="badge" style="background:var(--gb-purple);color:var(--gb-bg)">admin</span>
          <span x-show="!u.is_admin" class="badge" style="background:var(--gb-bg2);color:var(--gb-fg4)">user</span>
        </td>
        <td style="color:var(--gb-fg4);font-size:0.8rem" x-text="new Date(u.created_at).toLocaleDateString()"></td>
        <td>
          <button
            class="btn btn-danger btn-sm"
            @click="deleteUser(u.id, u.username)"
            :disabled="u.id === currentUserId"
            x-show="u.id !== currentUserId"
          >delete</button>
          <span x-show="u.id === currentUserId" style="color:var(--gb-fg4);font-size:0.72rem">—</span>
        </td>
      </tr>
    </template>
  </tbody>
</table>

<div x-show="deleteError" style="color:var(--gb-red-b);font-size:0.8rem;margin-top:12px" x-text="deleteError"></div>

</div>

<script>
function userAdmin() {
  return {
    users: {{ users | tojson }},
    currentUserId: {{ current_user_id }},
    showCreate: false,
    creating: false,
    createError: '',
    deleteError: '',
    form: { username: '', password: '', email: '', is_admin: false },

    resetForm() {
      this.form = { username: '', password: '', email: '', is_admin: false };
      this.createError = '';
    },

    async createUser() {
      this.createError = '';
      if (!this.form.username.trim()) { this.createError = 'Username is required'; return; }
      if (!this.form.password) { this.createError = 'Password is required'; return; }
      this.creating = true;
      try {
        const body = {
          username: this.form.username.trim(),
          password: this.form.password,
          is_admin: this.form.is_admin,
        };
        if (this.form.email.trim()) body.email = this.form.email.trim();
        const r = await fetch('/api/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await r.json();
        if (r.ok) {
          this.users.push({ ...data, created_at: data.created_at || new Date().toISOString() });
          this.showCreate = false;
          this.resetForm();
        } else {
          this.createError = data.detail || 'Failed to create user';
        }
      } catch (e) {
        this.createError = 'Network error';
      } finally {
        this.creating = false;
      }
    },

    async deleteUser(id, username) {
      if (!confirm(`Delete user "${username}"? Their extensions and alert rules will also be removed.`)) return;
      this.deleteError = '';
      try {
        const r = await fetch(`/api/users/${id}`, { method: 'DELETE' });
        if (r.ok) {
          this.users = this.users.filter(u => u.id !== id);
        } else {
          const data = await r.json();
          this.deleteError = data.detail || 'Delete failed';
        }
      } catch (e) {
        this.deleteError = 'Network error';
      }
    },
  };
}
</script>
{% endblock %}
