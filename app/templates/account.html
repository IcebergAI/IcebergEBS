{% extends "base.html" %}
{% block title %}Marvin — Preferences{% endblock %}

{% block content %}
<div x-data="accountPrefs()" x-init="init()">

<h1 style="font-size:1rem;color:var(--gb-fg4);font-weight:400;margin:0 0 24px">
  <span style="color:var(--gb-yellow-b)">account</span>
  <span style="color:var(--gb-bg3);margin:0 6px">/</span>
  <span>preferences</span>
</h1>

<!-- ── Alert Destinations ─────────────────────────────────── -->
<div style="margin-bottom:32px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div class="section-title" style="margin:0;border:none;padding:0">alert destinations</div>
    <button class="btn btn-primary btn-sm" @click="showAddDest=!showAddDest">+ add</button>
  </div>

  <!-- Add destination form -->
  <div class="card" x-show="showAddDest" x-cloak style="max-width:480px;margin-bottom:12px">
    <div style="display:flex;flex-direction:column;gap:10px">
      <div>
        <label style="display:block;font-size:0.72rem;color:var(--gb-fg4);margin-bottom:3px">LABEL</label>
        <input type="text" x-model="destForm.label" placeholder="e.g. Slack #security" @keydown.enter="addDest()">
      </div>
      <div>
        <label style="display:block;font-size:0.72rem;color:var(--gb-fg4);margin-bottom:3px">WEBHOOK URL</label>
        <input type="text" x-model="destForm.target" placeholder="https://hooks.example.com/..." @keydown.enter="addDest()">
      </div>
      <div x-show="destError" style="color:var(--gb-red-b);font-size:0.78rem" x-text="destError"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" @click="addDest()" :disabled="destSaving">
          <span x-show="!destSaving">save</span><span x-show="destSaving">saving...</span>
        </button>
        <button class="btn btn-ghost btn-sm" @click="showAddDest=false;resetDestForm()">cancel</button>
      </div>
    </div>
  </div>

  <template x-if="destinations.length === 0 && !showAddDest">
    <div style="color:var(--gb-fg4);font-size:0.82rem;padding:12px 0">
      no destinations configured — add a webhook URL to receive alerts
    </div>
  </template>

  <template x-if="destinations.length > 0">
    <table>
      <thead>
        <tr>
          <th>label</th>
          <th>url</th>
          <th>status</th>
          <th>actions</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="d in destinations" :key="d.id">
          <tr>
            <td style="font-weight:500" x-text="d.label"></td>
            <td style="color:var(--gb-fg4);font-size:0.78rem;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="d.target"></td>
            <td>
              <button class="btn btn-ghost btn-sm" @click="toggleDest(d)"
                      :style="d.enabled ? 'color:var(--gb-green-b);border-color:var(--gb-green)' : 'color:var(--gb-fg4)'"
                      x-text="d.enabled ? '● enabled' : '○ disabled'">
              </button>
            </td>
            <td style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
              <button class="btn btn-ghost btn-sm" @click="testDest(d)"
                      :disabled="testStatus[d.id] && testStatus[d.id].loading">test</button>
              <span x-show="testStatus[d.id] && testStatus[d.id].msg"
                    :style="testStatus[d.id] && testStatus[d.id].ok ? 'color:var(--gb-green-b)' : 'color:var(--gb-red-b)'"
                    style="font-size:0.75rem"
                    x-text="testStatus[d.id] ? testStatus[d.id].msg : ''"></span>
              <button class="btn btn-danger btn-sm" @click="deleteDest(d.id)">delete</button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </template>
</div>

<!-- ── Alert Rules ────────────────────────────────────────── -->
<div style="margin-bottom:32px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div class="section-title" style="margin:0;border:none;padding:0">alert rules</div>
    <button class="btn btn-primary btn-sm" @click="showAddRule=!showAddRule" :disabled="destinations.length===0"
            :title="destinations.length===0 ? 'Add a destination first' : ''">+ add</button>
  </div>

  <template x-if="destinations.length===0">
    <div style="color:var(--gb-fg4);font-size:0.82rem;padding:4px 0 12px">add a destination before creating rules</div>
  </template>

  <!-- Add rule form -->
  <div class="card" x-show="showAddRule" x-cloak style="max-width:480px;margin-bottom:12px">
    <div style="display:flex;flex-direction:column;gap:10px">
      <div>
        <label style="display:block;font-size:0.72rem;color:var(--gb-fg4);margin-bottom:3px">EVENT</label>
        <select x-model="ruleForm.event_type">
          <option value="risk_level_change">Risk level change</option>
          <option value="publisher_change">Publisher change</option>
          <option value="permission_change">Permission change</option>
          <option value="new_version">New version</option>
        </select>
      </div>
      <div>
        <label style="display:block;font-size:0.72rem;color:var(--gb-fg4);margin-bottom:3px">DESTINATION</label>
        <select x-model="ruleForm.destination_id">
          <template x-for="d in destinations" :key="d.id">
            <option :value="d.id" x-text="d.label"></option>
          </template>
        </select>
      </div>
      <div>
        <label style="display:block;font-size:0.72rem;color:var(--gb-fg4);margin-bottom:3px">EXTENSION <span style="color:var(--gb-bg3)">(optional — leave blank for all)</span></label>
        <select x-model="ruleForm.extension_id">
          <option value="">all extensions</option>
          <template x-for="e in extensions" :key="e.id">
            <option :value="e.id" x-text="'[' + e.store + '] ' + e.name"></option>
          </template>
        </select>
      </div>
      <div x-show="ruleError" style="color:var(--gb-red-b);font-size:0.78rem" x-text="ruleError"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" @click="addRule()" :disabled="ruleSaving">
          <span x-show="!ruleSaving">save</span><span x-show="ruleSaving">saving...</span>
        </button>
        <button class="btn btn-ghost btn-sm" @click="showAddRule=false;resetRuleForm()">cancel</button>
      </div>
    </div>
  </div>

  <template x-if="rules.length === 0 && !showAddRule">
    <div style="color:var(--gb-fg4);font-size:0.82rem;padding:12px 0">no rules configured</div>
  </template>

  <template x-if="rules.length > 0">
    <table>
      <thead>
        <tr>
          <th>event</th>
          <th>destination</th>
          <th>extension</th>
          <th>status</th>
          <th>actions</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="r in rules" :key="r.id">
          <tr>
            <td style="font-size:0.82rem" x-text="eventLabel(r.event_type)"></td>
            <td style="color:var(--gb-fg4);font-size:0.82rem" x-text="r.dest_label"></td>
            <td style="color:var(--gb-fg4);font-size:0.78rem" x-text="r.ext_name || '(all)'"></td>
            <td>
              <button class="btn btn-ghost btn-sm" @click="toggleRule(r)"
                      :style="r.enabled ? 'color:var(--gb-green-b);border-color:var(--gb-green)' : 'color:var(--gb-fg4)'"
                      x-text="r.enabled ? '● enabled' : '○ disabled'">
              </button>
            </td>
            <td>
              <button class="btn btn-danger btn-sm" @click="deleteRule(r.id)">delete</button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </template>
</div>

<!-- ── Recent Alert Activity ──────────────────────────────── -->
<div>
  <div class="section-title" style="margin:0 0 12px;border:none;padding:0">recent alert activity</div>

  <template x-if="alertLog.length === 0">
    <div style="color:var(--gb-fg4);font-size:0.82rem;padding:12px 0">no alerts fired yet</div>
  </template>

  <template x-if="alertLog.length > 0">
    <table>
      <thead>
        <tr>
          <th>time</th>
          <th>event</th>
          <th>extension</th>
          <th>destination</th>
          <th>status</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="row in alertLog" :key="row.id">
          <tr>
            <td style="color:var(--gb-fg4);font-size:0.75rem;white-space:nowrap" x-text="formatTime(row.sent_at)"></td>
            <td style="font-size:0.82rem" x-text="eventLabel(row.event_type)"></td>
            <td style="color:var(--gb-fg4);font-size:0.82rem" x-text="row.ext_name"></td>
            <td style="color:var(--gb-fg4);font-size:0.82rem" x-text="row.dest_label"></td>
            <td>
              <span x-show="row.success" style="color:var(--gb-green-b);font-size:0.8rem">✓ ok</span>
              <span x-show="!row.success" style="color:var(--gb-red-b);font-size:0.8rem"
                    :title="row.error">✗ failed</span>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </template>
</div>

<div x-show="globalError" style="color:var(--gb-red-b);font-size:0.82rem;margin-top:16px" x-text="globalError"></div>

</div>

<script>
function accountPrefs() {
  const EVENT_LABELS = {
    risk_level_change: 'Risk level change',
    publisher_change:  'Publisher change',
    permission_change: 'Permission change',
    new_version:       'New version',
  };

  return {
    destinations: {{ destinations_json }},
    rules: {{ rules_json }},
    extensions: {{ extensions_json }},
    alertLog: [],

    showAddDest: false,
    destSaving: false,
    destError: '',
    destForm: { label: '', target: '' },
    testStatus: {},  // { [dest_id]: { loading, ok, msg } }

    showAddRule: false,
    ruleSaving: false,
    ruleError: '',
    ruleForm: { event_type: 'risk_level_change', destination_id: '', extension_id: '' },

    globalError: '',

    async init() {
      if (this.destinations.length > 0) {
        this.ruleForm.destination_id = this.destinations[0].id;
      }
      try {
        const r = await fetch('/api/alerts/log');
        if (r.ok) this.alertLog = await r.json();
      } catch { /* non-fatal */ }
    },

    eventLabel(type) { return EVENT_LABELS[type] || type; },

    formatTime(iso) {
      return new Date(iso).toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'short' });
    },

    resetDestForm() { this.destForm = { label: '', target: '' }; this.destError = ''; },
    resetRuleForm() {
      this.ruleForm = {
        event_type: 'risk_level_change',
        destination_id: this.destinations[0]?.id ?? '',
        extension_id: '',
      };
      this.ruleError = '';
    },

    // ── Destinations ──────────────────────────────────
    async addDest() {
      this.destError = '';
      if (!this.destForm.label.trim()) { this.destError = 'Label is required'; return; }
      if (!this.destForm.target.trim()) { this.destError = 'Webhook URL is required'; return; }
      this.destSaving = true;
      try {
        const r = await fetch('/api/alerts/destinations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ label: this.destForm.label.trim(), target: this.destForm.target.trim() }),
        });
        const data = await r.json();
        if (r.ok) {
          this.destinations.push(data);
          if (this.ruleForm.destination_id === '') this.ruleForm.destination_id = data.id;
          this.showAddDest = false;
          this.resetDestForm();
        } else {
          this.destError = data.detail || 'Save failed';
        }
      } catch { this.destError = 'Network error'; }
      finally { this.destSaving = false; }
    },

    async toggleDest(dest) {
      const r = await fetch(`/api/alerts/destinations/${dest.id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled: !dest.enabled }),
      });
      if (r.ok) dest.enabled = !dest.enabled;
      else this.globalError = 'Update failed';
    },

    async testDest(dest) {
      this.testStatus[dest.id] = { loading: true, ok: false, msg: '' };
      try {
        const r = await fetch(`/api/alerts/destinations/${dest.id}/test`, { method: 'POST' });
        const data = await r.json();
        if (r.ok) {
          this.testStatus[dest.id] = { loading: false, ok: true, msg: '✓ delivered' };
        } else {
          this.testStatus[dest.id] = { loading: false, ok: false, msg: '✗ ' + (data.detail || 'failed') };
        }
      } catch {
        this.testStatus[dest.id] = { loading: false, ok: false, msg: '✗ network error' };
      }
      setTimeout(() => { this.testStatus[dest.id] = null; }, 4000);
    },

    async deleteDest(id) {
      if (!confirm('Delete this destination? Any rules using it will also be removed.')) return;
      const r = await fetch(`/api/alerts/destinations/${id}`, { method: 'DELETE' });
      if (r.ok) {
        this.destinations = this.destinations.filter(d => d.id !== id);
        this.rules = this.rules.filter(r => r.destination_id !== id);
      } else this.globalError = 'Delete failed';
    },

    // ── Rules ─────────────────────────────────────────
    async addRule() {
      this.ruleError = '';
      if (!this.ruleForm.destination_id) { this.ruleError = 'Select a destination'; return; }
      this.ruleSaving = true;
      try {
        const body = {
          event_type: this.ruleForm.event_type,
          destination_id: Number(this.ruleForm.destination_id),
        };
        if (this.ruleForm.extension_id) body.extension_id = Number(this.ruleForm.extension_id);
        const r = await fetch('/api/alerts/rules', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await r.json();
        if (r.ok) {
          const dest = this.destinations.find(d => d.id === data.destination_id);
          const ext = this.extensions.find(e => e.id === data.extension_id);
          this.rules.push({
            ...data,
            dest_label: dest?.label ?? '—',
            ext_name: ext?.name ?? null,
          });
          this.showAddRule = false;
          this.resetRuleForm();
        } else {
          this.ruleError = data.detail || 'Save failed';
        }
      } catch { this.ruleError = 'Network error'; }
      finally { this.ruleSaving = false; }
    },

    async toggleRule(rule) {
      const r = await fetch(`/api/alerts/rules/${rule.id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled: !rule.enabled }),
      });
      if (r.ok) rule.enabled = !rule.enabled;
      else this.globalError = 'Update failed';
    },

    async deleteRule(id) {
      if (!confirm('Delete this alert rule?')) return;
      const r = await fetch(`/api/alerts/rules/${id}`, { method: 'DELETE' });
      if (r.ok) this.rules = this.rules.filter(r => r.id !== id);
      else this.globalError = 'Delete failed';
    },
  };
}
</script>
{% endblock %}
