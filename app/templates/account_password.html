{% extends "base.html" %}
{% block title %}IcebergEBS — Change password{% endblock %}

{% block content %}
<div class="max-w-md" x-data="changePassword()">

<div class="flex items-center gap-2 text-[12.5px] mb-2" style="color:var(--ink-5)">
  <a href="/account">Account</a>
  <span>/</span>
  <span style="color:var(--ink-7)">Change password</span>
</div>
<h1 class="page-title mb-5">Change password</h1>

<div class="surface p-6">
  <div class="flex flex-col gap-3">
    <div>
      <label class="label-cap block mb-1.5">Current password</label>
      <input type="password" x-model="form.current_password" @keydown.enter="submit()">
    </div>
    <div>
      <label class="label-cap block mb-1.5">New password</label>
      <input type="password" x-model="form.new_password" @keydown.enter="submit()">
    </div>
    <div>
      <label class="label-cap block mb-1.5">Confirm new password</label>
      <input type="password" x-model="form.confirm_password" @keydown.enter="submit()">
    </div>
    <div x-show="error" class="text-[12.5px]" style="color:var(--risk-critical)" x-text="error"></div>
    <div x-show="success" class="text-[12.5px]" style="color:var(--risk-low)">Password changed successfully.</div>
    <div class="flex gap-2 mt-1">
      <button class="btn btn-primary" @click="submit()" :disabled="saving">
        <span x-show="!saving">Change password</span>
        <span x-show="saving">Saving…</span>
      </button>
      <a href="/account" class="btn btn-ghost">Cancel</a>
    </div>
  </div>
</div>

</div>

<script>
function changePassword() {
  return {
    form: { current_password: '', new_password: '', confirm_password: '' },
    saving: false, error: '', success: false,
    async submit() {
      this.error = ''; this.success = false;
      if (!this.form.current_password) { this.error = 'Current password is required'; return; }
      if (!this.form.new_password) { this.error = 'New password is required'; return; }
      if (this.form.new_password !== this.form.confirm_password) { this.error = 'Passwords do not match'; return; }
      if (this.form.new_password.length < 8) { this.error = 'New password must be at least 8 characters'; return; }
      this.saving = true;
      try {
        const r = await fetch('/api/users/me/password', {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ current_password: this.form.current_password, new_password: this.form.new_password }),
        });
        if (r.ok) {
          window.location.href = '/login';
        } else { const data = await r.json(); this.error = data.detail || 'Failed to change password'; }
      } catch { this.error = 'Network error'; }
      finally { this.saving = false; }
    },
  };
}
</script>
{% endblock %}
