{% extends "base.html" %}
{% block title %}Marvin — Change Password{% endblock %}

{% block content %}
<div x-data="changePassword()">

<h1 style="font-size:1rem;color:var(--gb-fg4);font-weight:400;margin:0 0 24px">
  <span style="color:var(--gb-yellow-b)">account</span>
  <span style="color:var(--gb-bg3);margin:0 6px">/</span>
  <span>change password</span>
</h1>

<div class="card" style="max-width:400px">
  <div style="display:flex;flex-direction:column;gap:12px">
    <div>
      <label style="display:block;font-size:0.72rem;color:var(--gb-fg4);margin-bottom:3px">CURRENT PASSWORD</label>
      <input type="password" x-model="form.current_password" @keydown.enter="submit()">
    </div>
    <div>
      <label style="display:block;font-size:0.72rem;color:var(--gb-fg4);margin-bottom:3px">NEW PASSWORD</label>
      <input type="password" x-model="form.new_password" @keydown.enter="submit()">
    </div>
    <div>
      <label style="display:block;font-size:0.72rem;color:var(--gb-fg4);margin-bottom:3px">CONFIRM NEW PASSWORD</label>
      <input type="password" x-model="form.confirm_password" @keydown.enter="submit()">
    </div>
    <div x-show="error" style="color:var(--gb-red-b);font-size:0.78rem" x-text="error"></div>
    <div x-show="success" style="color:var(--gb-green-b);font-size:0.78rem">password changed successfully</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" @click="submit()" :disabled="saving">
        <span x-show="!saving">change password</span><span x-show="saving">saving...</span>
      </button>
      <a href="/account" class="btn btn-ghost btn-sm">cancel</a>
    </div>
  </div>
</div>

</div>

<script>
function changePassword() {
  return {
    form: { current_password: '', new_password: '', confirm_password: '' },
    saving: false,
    error: '',
    success: false,

    async submit() {
      this.error = '';
      this.success = false;
      if (!this.form.current_password) { this.error = 'Current password is required'; return; }
      if (!this.form.new_password) { this.error = 'New password is required'; return; }
      if (this.form.new_password !== this.form.confirm_password) { this.error = 'Passwords do not match'; return; }
      if (this.form.new_password.length < 8) { this.error = 'New password must be at least 8 characters'; return; }
      this.saving = true;
      try {
        const r = await fetch('/api/users/me/password', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            current_password: this.form.current_password,
            new_password: this.form.new_password,
          }),
        });
        if (r.ok) {
          this.success = true;
          this.form = { current_password: '', new_password: '', confirm_password: '' };
        } else {
          const data = await r.json();
          this.error = data.detail || 'Failed to change password';
        }
      } catch { this.error = 'Network error'; }
      finally { this.saving = false; }
    },
  };
}
</script>
{% endblock %}
