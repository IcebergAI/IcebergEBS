image:
  repository: ghcr.io/yourorg/icebergebs
  # No default (#88): pin an immutable release tag at install/upgrade, e.g.
  # --set image.tag=v0.1.0-beta.1. An empty tag fails the render (see deployment.yaml's
  # `required`) rather than silently deploying a mutable `:latest` — which, with the
  # IfNotPresent pull policy below, re-renders an identical pod spec on `helm upgrade`
  # (no rollout) and reuses the node's cached image, shipping stale code. Immutable tags
  # also make `helm rollback` restore a known-good build. Verify the image before rollout
  # (docs/RELEASING.md). IfNotPresent is correct *because* the tag is immutable.
  tag: ""
  pullPolicy: IfNotPresent

# Must stay at 1 — APScheduler runs per-process; multiple replicas would each
# independently refresh watchlisted extensions and write duplicate AlertLog rows.
replicaCount: 1

# Grace period for the scheduler to drain an in-flight watchlist refresh on shutdown
# before SIGKILL (#109). Raise it above your worst-case single-extension refresh time
# (metadata fetch + package download + inspection); k8s default is 30s.
terminationGracePeriodSeconds: 60

# With replicaCount 1 the PDB uses maxUnavailable: 0 — it blocks *voluntary* disruption
# (node drains/evictions) so an eviction can't take the singleton to 0. Rollouts are
# handled separately by the Deployment's `strategy: Recreate`, which prevents the
# two-scheduler window a rolling update would otherwise open. Disable the PDB to allow
# drains (accepting brief downtime). See templates/pdb.yaml + templates/deployment.yaml.
podDisruptionBudget:
  enabled: true

icebergEbs:
  adminUsername: admin
  adminPassword: ""        # required — set via --set or existingSecret; never commit a value here
  secretKey: ""            # required — set via --set or existingSecret; never commit a value here
  appBaseUrl: ""           # e.g. https://icebergebs.example.com; included as iceberg_ebs_url in webhook payloads
  fetchIntervalMinutes: 60
  # Prune FetchLog / InstallCountHistory / AlertLog rows older than this many days.
  # 0 disables pruning; set to e.g. 90 for a real watchlist so history doesn't grow
  # unbounded (#22, #87).
  retentionDays: 0
  sessionMaxAge: 86400     # session lifetime in seconds
  httpxTimeout: 15.0       # outbound HTTP timeout in seconds
  secureCookies: true
  logJson: false          # emit single-line JSON logs for a collector (#89)

postgresql:
  auth:
    username: iceberg_ebs
    password: ""           # required — set via --set; never commit a value here
    database: iceberg_ebs
  # Disable the Bitnami subchart's OWN NetworkPolicy (#103). Kubernetes unions the
  # ingress allowances of every policy that selects a pod, so if the subchart's policy
  # stays enabled (its default allows broader ingress) it would re-open Postgres
  # regardless of our restrictive allow-postgres-from-app rule — the union can only add
  # access, never revoke it. With this off, our chart's policy is the only one selecting
  # the Postgres pods, so app-only:5432 actually holds. (No-op when networkPolicy.enabled
  # is false and you rely on the subchart's instead — but then set its `.ingress` yourself.)
  networkPolicy:
    enabled: false

ingress:
  host: icebergebs.example.com
  className: nginx
  certManagerIssuer: letsencrypt-prod  # set to "" to disable cert-manager annotation

networkPolicy:
  # Default-deny ingress + named hops (ingress→app:8000, app→postgres:5432). Egress is
  # left open (the app must reach the extension stores / webhooks / TI feeds). Requires a
  # CNI that enforces NetworkPolicy (Calico/Cilium); a harmless no-op otherwise (#103).
  enabled: true
  ingressController:
    # The ingress controller's namespace — its pods may reach the app on 8000. Adjust to
    # your cluster (the ingress-nginx namespace is auto-labelled kubernetes.io/metadata.name).
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: ingress-nginx

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
