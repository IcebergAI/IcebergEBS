{{- if .Values.postgresql.enabled }}
{{/*
Bundled PostgreSQL, replacing the Bitnami postgresql subchart (#276).

Why we own this rather than depend on a subchart: Broadcom's 2025 Bitnami
catalog migration moved every *versioned* image tag to `bitnamilegacy` and left
`docker.io/bitnami/postgresql` publishing `latest` only. The chart's old
`~15.x.x` pin therefore ImagePullBackOffs on a fresh install today, and the
current Bitnami chart — while it does ship PG 18 — can only do so via a moving
`latest` tag on the free tier, which could roll a running deployment onto a new
PostgreSQL major on a pod restart, against an existing PGDATA.

`docker.io/library/postgres` is the same image Compose and the CI service
container already use, so the Helm path now runs the *exact* version the rest of
the project is tested against, pinned and guarded by
tests/test_helm_postgres.py::test_helm_postgres_major_matches_compose.

The resource name stays `<release>-postgresql` — what the subchart used — so the
app Deployment's wiring and the allow-postgres-from-app NetworkPolicy selector
are unchanged. No backup or failover story here on purpose: replicaCount is
pinned at 1 chart-wide (APScheduler is per-process), and DEPLOYMENT.md points
anything beyond a homelab at externalDatabase + a managed provider.
*/}}
{{/*
Refuse to upgrade a release whose database is still the Bitnami subchart's.

Bitnami stores its data at /bitnami/postgresql/data; ours is PGDATA=<mount>/pgdata.
The volumeClaimTemplate is called `data` in both, so a recreated StatefulSet binds
the SAME PVC, finds no pgdata directory, and initdb cheerfully creates a brand-new
empty PostgreSQL 18 cluster beside the untouched PostgreSQL 16 data. The app then
starts, Alembic builds a fresh schema, and every probe is green while every row is
gone. Silent, and it looks like a successful upgrade — so make it unreachable by
accident rather than documenting around it.

`lookup` returns empty during `helm template` / `--dry-run`, so this never fires on
a fresh install or in CI; only against a live cluster still running the subchart.
*/}}
{{- $existing := lookup "apps/v1" "StatefulSet" .Release.Namespace (include "iceberg-ebs.postgresql.fullname" .) -}}
{{- if $existing -}}
  {{- $bitnami := false -}}
  {{- range $existing.spec.template.spec.containers -}}
    {{- if contains "bitnami" .image -}}{{- $bitnami = true -}}{{- end -}}
  {{- end -}}
  {{- if $bitnami -}}
    {{- fail (printf "Refusing to upgrade: StatefulSet %q is still the Bitnami PostgreSQL. Its on-disk layout is incompatible with this chart's own PostgreSQL, and reusing its PVC would silently initialise an EMPTY database (#276). Follow 'Migrating from the Bitnami subchart' in DEPLOYMENT.md: dump the data, delete the StatefulSet, its Service and its PVC, upgrade, then restore." (include "iceberg-ebs.postgresql.fullname" .)) -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "iceberg-ebs.postgresql.fullname" . }}
  labels:
    {{- include "iceberg-ebs.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Key name kept as `password` — the app Deployment's secretKeyRef reads it.
  password: {{ .Values.postgresql.auth.password | required "postgresql.auth.password is required when postgresql.enabled=true" | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iceberg-ebs.postgresql.fullname" . }}
  labels:
    {{- include "iceberg-ebs.labels" . | nindent 4 }}
spec:
  # Headless: a StatefulSet's stable network identity, and the app connects
  # through this name as the DSN host.
  clusterIP: None
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
  selector:
    {{- include "iceberg-ebs.postgresql.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "iceberg-ebs.postgresql.fullname" . }}
  labels:
    {{- include "iceberg-ebs.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "iceberg-ebs.postgresql.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "iceberg-ebs.postgresql.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "iceberg-ebs.postgresql.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        # The alpine image's postgres user. fsGroup gives the mounted PVC group
        # ownership, which is what lets the entrypoint initialise PGDATA without
        # running as root.
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          ports:
            - name: postgresql
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "iceberg-ebs.postgresql.fullname" . }}
                  key: password
            # A subdirectory, not the mount point itself: a PVC root often carries
            # a lost+found, and initdb refuses to run in a non-empty directory.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          # `pg_isready -h localhost` over TCP, not the default Unix socket, so the
          # probe exercises the path the app actually uses.
          livenessProbe:
            exec:
              command: ["pg_isready", "-h", "localhost", "-U", "{{ .Values.postgresql.auth.username }}", "-d", "{{ .Values.postgresql.auth.database }}"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["pg_isready", "-h", "localhost", "-U", "{{ .Values.postgresql.auth.username }}", "-d", "{{ .Values.postgresql.auth.database }}"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            # readOnlyRootFilesystem: Postgres still needs its socket directory
            # and scratch space.
            - name: run
              mountPath: /var/run/postgresql
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
      volumes:
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        {{- with .Values.postgresql.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size | quote }}
{{- end }}
