apiVersion: v1
kind: Secret
metadata:
  name: {{ include "iceberg-ebs.fullname" . }}
  labels:
    {{- include "iceberg-ebs.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-password: {{ .Values.icebergEbs.adminPassword | required "icebergEbs.adminPassword is required" | quote }}
  secret-key:     {{ .Values.icebergEbs.secretKey     | required "icebergEbs.secretKey is required"     | quote }}
  # Outbound-proxy credentials (#216) — optional, unlike the two above. Rendered even
  # when empty so the Deployment's secretKeyRef always resolves; the app treats an
  # empty username as "no proxy auth".
  proxy-username: {{ .Values.icebergEbs.proxyUsername | quote }}
  proxy-password: {{ .Values.icebergEbs.proxyPassword | quote }}
  # OIDC client secrets (#32) — optional like the proxy credentials: rendered even
  # when empty so the Deployment's secretKeyRef always resolves; validation only
  # requires a secret for providers that are actually enabled.
  oidc-entra-client-secret:     {{ .Values.icebergEbs.oidcEntraClientSecret | quote }}
  oidc-authentik-client-secret: {{ .Values.icebergEbs.oidcAuthentikClientSecret | quote }}
  oidc-auth0-client-secret:     {{ .Values.icebergEbs.oidcAuth0ClientSecret | quote }}
  oidc-okta-client-secret:      {{ .Values.icebergEbs.oidcOktaClientSecret | quote }}
