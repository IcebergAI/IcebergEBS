apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "iceberg-ebs.fullname" . }}-caddy
  labels:
    {{- include "iceberg-ebs.labels" . | nindent 4 }}
# NOTE: the two entries below are an EXACT mirror of the canonical files at repo root —
# caddy/Caddyfile.k8s and caddy/headers.caddy. Helm's .Files.Get cannot read files above
# the chart directory, so the K8s edge config is embedded here rather than referenced.
# tests/test_helm_caddy.py compares each block byte-for-byte with the canonical file, and
# tests/test_csp_strict.py + tests/test_security_headers.py guard the header contract —
# so the "single source" guarantee is enforced by CI, not by hand (#188). Edit caddy/ and
# re-mirror, never edit only here.
data:
  # Mirror of caddy/Caddyfile.k8s (mounted as /etc/caddy/Caddyfile — the default config path).
  Caddyfile: |
    # In-pod reverse proxy for the Kubernetes deployment (#188). Topology: cluster ingress
    # (TLS termination via cert-manager, edge rate limiting) → THIS Caddy sidecar → app on
    # localhost:8000. The app owns the canonical security headers (app/main.py:
    # security_headers); the sidecar imports the same headers.caddy set-if-absent fallback
    # as Compose, and the ingress still doesn't duplicate any CSP snippet.
    #
    # Delivered to the pod as a ConfigMap mounted at /etc/caddy (see the Helm chart), so the
    # `import headers.caddy` path resolves next to this file exactly as it does in Compose.
    {
    	admin off
    	# The ingress terminates TLS and forwards plain HTTP to this sidecar — no TLS here.
    	auto_https off
    	servers {
    		# Trust the cluster ingress (a private-range peer) to have set X-Forwarded-For to
    		# the real external client, so {client_ip} below resolves to that client rather than
    		# the ingress pod IP. A direct (untrusted) peer's forged XFF is still discarded (#77).
    		trusted_proxies static private_ranges
    		# STRICT parsing (Caddy recommends it whenever trusted proxies *append* to XFF, which
    		# ingress-nginx can — e.g. behind another private-range LB). Without it, the right-to-left
    		# scan can skip a trusted private-range suffix and return an attacker-controlled leftmost
    		# value as {client_ip}, letting a forged XFF evade the app's per-IP rate limiters (#77).
    		trusted_proxies_strict
    	}
    }

    :8080 {
    	# Structured (JSON) access log to stderr — carries request User-Agent/Referer and
    	# duration by default (#89); Cookie/Authorization are redacted.
    	log

    	encode gzip
    	request_body {
    		max_size 2MB
    	}

    	# Sidecar liveness/readiness endpoint (answered locally, not proxied).
    	handle /caddy-health {
    		respond "ok" 200
    	}

    	# Fallback security headers (set-if-absent, shared with Compose) — the app owns
    	# the canonical set; these only apply to Caddy-generated responses.
    	import headers.caddy

    	# Everything (including /static, which the app serves via StaticFiles) → the app in the
    	# same pod. header_up X-Forwarded-For {client_ip} passes a single canonical client IP:
    	# with trusted_proxies set, {client_ip} is the real external client from the ingress's XFF.
    	handle {
    		reverse_proxy localhost:8000 {
    			header_up X-Forwarded-For {client_ip}
    			transport http {
    				dial_timeout 10s
    				read_timeout 120s
    			}
    		}
    	}
    }
  # Mirror of caddy/headers.caddy (imported by the Caddyfile above via `import headers.caddy`).
  headers.caddy: |
    # MINIMAL STATIC FALLBACK security headers — the app (app/main.py:security_headers)
    # is the canonical owner of every security header on every response it generates.
    # This block exists only for responses Caddy itself generates and the app never sees:
    # Caddy's own 502 when the app is down, and the :80 → HTTPS redirect. Imported by both
    # the Compose Caddyfile and the Kubernetes Caddyfile (caddy/Caddyfile{,.k8s}).
    #
    # Every op here uses `?` (set-if-absent): on a proxied response the app's canonical
    # header already exists, so nothing here applies. A hard SET must NEVER reappear in
    # this file — it would clobber the app's canonical value (the #201 double-header bug
    # class, inverted); tests/test_security_headers.py enforces ?-only ops.
    #
    # The fallback CSP is deliberately a tiny static deny-all — Caddy's own error/redirect
    # responses render no content — so it never needs syncing with the app policy.
    #
    # `defer` is REQUIRED: it runs these ops AFTER reverse_proxy has copied the upstream
    # (app) response headers, which is what lets `?` see the app's canonical values and
    # stand down. Without it the fallback would be applied first and the app's header
    # copied in afterwards — two CSP values, and the browser enforces the intersection
    # (default-src 'none'), breaking every page (#201).
    header {
    	defer
    	?Content-Security-Policy "default-src 'none'; frame-ancestors 'none'"
    	?Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    	?X-Content-Type-Options "nosniff"
    	?X-Frame-Options "DENY"
    	?Referrer-Policy "same-origin"
    	?Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    	# Don't advertise the server software (parity with nginx `server_tokens off`).
    	-Server
    }
