apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "iceberg-ebs.fullname" . }}
  labels:
    {{- include "iceberg-ebs.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # Edge rate limiting stays at the cluster ingress (#188): stock Caddy has no
    # rate_limit directive, so the in-pod Caddy sidecar does not limit; the app-side
    # limiter (ICEBERG_EBS_API_RATE_LIMIT_ENABLED) is the second layer.
    nginx.ingress.kubernetes.io/limit-rps: "2"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # The app owns the canonical security headers (CSP, HSTS, Permissions-Policy, … —
    # app/main.py:security_headers); the Caddy sidecar carries only a set-if-absent
    # fallback, so the ingress duplicates no configuration-snippet CSP — that two-places
    # duplication is exactly what #188 removed.
    #
    # NOTE: there is deliberately NO per-ingress HSTS annotation here. ingress-nginx's HSTS is
    # a controller-wide ConfigMap setting (`hsts`, `hsts-max-age`, `hsts-preload`), not a
    # per-Ingress annotation — `nginx.ingress.kubernetes.io/hsts` does not exist and was
    # silently ignored (#201). On a default controller (`hsts: true`) the controller's own
    # `Strict-Transport-Security` (max-age 15724800, no preload) OVERRIDES the app's
    # canonical one (max-age 63072000, preload), so the app's never reaches the client. To
    # make the app's the single copy, disable HSTS at the controller ConfigMap
    # (`hsts: "false"`) — see DEPLOYMENT.md → Kubernetes. Not insecure either way (both
    # enforce HTTPS).
    {{- if .Values.ingress.certManagerIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManagerIssuer | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ include "iceberg-ebs.fullname" . }}-tls
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "iceberg-ebs.fullname" . }}
                port:
                  number: 8080
