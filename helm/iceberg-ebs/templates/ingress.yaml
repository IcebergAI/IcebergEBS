apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "iceberg-ebs.fullname" . }}
  labels:
    {{- include "iceberg-ebs.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # Edge rate limiting stays at the cluster ingress (#188): stock Caddy has no
    # rate_limit directive, so the in-pod Caddy sidecar does not limit; the app-side
    # limiter (ICEBERG_EBS_API_RATE_LIMIT_ENABLED) is the second layer.
    nginx.ingress.kubernetes.io/limit-rps: "2"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # The Caddy sidecar now owns the canonical security headers (CSP, HSTS,
    # Permissions-Policy, …) via caddy/headers.caddy, so the ingress no longer duplicates
    # a configuration-snippet CSP — that two-places duplication is exactly what #188
    # removed. Disable the ingress-controller's own HSTS so Caddy's is the single copy.
    nginx.ingress.kubernetes.io/hsts: "false"
    {{- if .Values.ingress.certManagerIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManagerIssuer | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ include "iceberg-ebs.fullname" . }}-tls
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "iceberg-ebs.fullname" . }}
                port:
                  number: 8080
