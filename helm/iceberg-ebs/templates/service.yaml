apiVersion: v1
kind: Service
metadata:
  name: {{ include "iceberg-ebs.fullname" . }}
  labels:
    {{- include "iceberg-ebs.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    # Fronts the pod's Caddy sidecar (#188); Caddy proxies to the app on localhost:8000.
    - port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    {{- include "iceberg-ebs.selectorLabels" . | nindent 4 }}
