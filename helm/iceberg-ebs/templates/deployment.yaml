apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iceberg-ebs.fullname" . }}
  labels:
    {{- include "iceberg-ebs.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Recreate (not the default RollingUpdate): with replicas=1 a rolling update's
  # default maxSurge would briefly run a second pod, and two APScheduler processes
  # duplicate watchlist refreshes + AlertLog rows (the exact thing replicas=1 exists
  # to prevent). Recreate terminates the old pod before starting the new one, so a
  # deploy is never a two-scheduler window — at the cost of a brief downtime gap on
  # each rollout, which is acceptable for this single-replica app (#104).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "iceberg-ebs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "iceberg-ebs.selectorLabels" . | nindent 8 }}
    spec:
      # Give the scheduler time to drain an in-flight watchlist refresh on shutdown before
      # SIGKILL, so a job isn't abandoned between committing a state change and firing its
      # alert (#109). Exceed the worst-case single-extension refresh time. (The durable
      # pending-alert marker recovers anything still dropped past this window.)
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      # The app never talks to the Kubernetes API, so don't mount a token an attacker
      # who compromised the untrusted-package parser could pivot with.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: iceberg-ebs
          # image.tag has no default (#88): an empty value fails the render via `required`
          # rather than silently deploying a mutable `:latest`, which with IfNotPresent
          # ships stale code on upgrade and can't be rolled back to a known-good build.
          # Pin an immutable release tag: --set image.tag=v0.1.0-beta.1 (see DEPLOYMENT.md).
          image: "{{ .Values.image.repository }}:{{ required "image.tag is required — pin an immutable release tag, e.g. --set image.tag=v0.1.0-beta.1 (never :latest); see DEPLOYMENT.md and docs/RELEASING.md (#88)" .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "iceberg-ebs.fullname" . }}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "iceberg-ebs.fullname" . }}-postgresql
                  key: password
            - name: ICEBERG_EBS_DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.postgresql.auth.username }}:$(POSTGRES_PASSWORD)@{{ include "iceberg-ebs.fullname" . }}-postgresql/{{ .Values.postgresql.auth.database }}"
            - name: ICEBERG_EBS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "iceberg-ebs.fullname" . }}
                  key: admin-password
            - name: ICEBERG_EBS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "iceberg-ebs.fullname" . }}
                  key: secret-key
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
