{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "iceberg-ebs.fullname" . }}
  labels:
    {{- include "iceberg-ebs.labels" . | nindent 4 }}
spec:
  # replicaCount is mandatorily 1 (APScheduler is per-process — two pods would double
  # every watchlist refresh and AlertLog row). A PDB only governs *voluntary* disruption
  # (node drains, evictions), so maxUnavailable: 0 stops an eviction from taking the
  # singleton to zero behind your back. It does NOT constrain rollouts — the two-pod
  # rollout window is prevented separately by the Deployment's `strategy: Recreate`
  # (see deployment.yaml). To drain a node on purpose, delete this PDB (or set
  # podDisruptionBudget.enabled=false) and accept the brief downtime.
  maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "iceberg-ebs.selectorLabels" . | nindent 6 }}
{{- end }}
