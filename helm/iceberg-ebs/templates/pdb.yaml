{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "iceberg-ebs.fullname" . }}
  labels:
    {{- include "iceberg-ebs.labels" . | nindent 4 }}
spec:
  # replicaCount is mandatorily 1 (APScheduler is per-process — two pods would double
  # every watchlist refresh and AlertLog row). maxUnavailable: 0 therefore blocks
  # *voluntary* disruption (node drains, evictions) entirely, so the cluster never
  # runs the singleton at zero or two replicas behind your back. To drain a node on
  # purpose, delete this PDB (or set podDisruptionBudget.enabled=false) and accept the
  # brief downtime.
  maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "iceberg-ebs.selectorLabels" . | nindent 6 }}
{{- end }}
