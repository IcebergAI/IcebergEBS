name: build

# On every push to main, compute the build version (build N · sha, matching
# app/version.py) and bake it into a Docker image via the ICEBERG_EBS_VERSION build-arg,
# so container/Helm deploys report the same version the rail shows. The bare-uvicorn
# droplet does NOT depend on this workflow — it resolves the version from git at
# runtime. If you don't use GHCR, drop the login + set `push: false` below.
#
# This publishes DEV images only: an immutable :<sha> plus a moving :edge pointer
# for "latest main" — NOT a release, and NOT what you deploy. Signed, attested,
# SemVer-tagged release images come from release.yml (tag a `v*` SemVer tag). There
# is deliberately no :latest here: a mutable :latest reads as "deploy me" and, with
# the Helm chart's IfNotPresent, silently ships stale code (#88).

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

# Serialize edge builds: two quick merges to main otherwise race, and the older
# commit's job can push last (build-cache variance), leaving the mutable :edge pointer
# at the older build until the next merge — the stale-pointer confusion class #88
# removed :latest to avoid. A superseded main *build* is pure waste (unlike CI's six
# jobs, whose green record on the commit is the point), so cancel it (#289).
concurrency:
  group: build-edge
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Cap the job so a wedged build/push step can't burn the 6h default, matching ci.yml.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history is required — Actions does a shallow clone by default,
          # which makes `git rev-list --count` wrong.
          fetch-depth: 0
          # zizmor artipacked: the GHCR push authenticates with secrets.GITHUB_TOKEN
          # (docker/login-action), not the persisted git credential, so don't leave
          # the repo token behind in .git/config.
          persist-credentials: false

      # This string MUST match app/version.py:_format() byte for byte — a drift here
      # is invisible until a container deploy reports a different version from the
      # bare-uvicorn droplet. The SemVer is read from pyproject.toml, never hardcoded.
      - name: Compute version
        run: |
          VERSION=$(python3 -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          COUNT=$(git rev-list --count --first-parent HEAD)
          SHA=$(git rev-parse --short HEAD)
          echo "ICEBERG_EBS_VERSION=v${VERSION} · build ${COUNT} · ${SHA}" >> "$GITHUB_ENV"
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          build-args: |
            ICEBERG_EBS_VERSION=${{ env.ICEBERG_EBS_VERSION }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:edge
