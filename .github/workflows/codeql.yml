name: CodeQL

# SAST via CodeQL, deliberately in its own workflow (not ci.yml) so the elevated
# security-events: write scope lives in exactly one place and the CI gates stay
# least-privilege (contents: read). Source / no-build extraction over both
# languages; the weekly schedule re-scans already-merged code as new advisories
# and query versions land, not just new PRs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    # Cap the job so a wedged extraction/analysis step can't burn the 6h default,
    # matching ci.yml's per-job caps (#289).
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write # upload SARIF results
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # Python is the substantial surface (untrusted-package inspection,
        # webhooks, store scraping). javascript-typescript is small but real:
        # our own static/js/*.js. Alpine is vendored at static/js/vendor/ since
        # #85/#106 (no CDN) — a minified third-party bundle we don't own, excluded
        # via paths-ignore below so its findings aren't attributed to this repo.
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          # No build step exists (uv-only Python, hand-written self-hosted JS, no
          # node toolchain), so source extraction is correct for both legs.
          build-mode: none
          # Don't scan the vendored, minified Alpine CSP build (static/js/vendor/) —
          # third-party code we don't maintain; its alert noise isn't ours to fix (#289).
          config: |
            paths-ignore:
              - static/js/vendor
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
