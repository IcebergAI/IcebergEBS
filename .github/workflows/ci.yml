name: CI

# Correctness + static-analysis gates. Runs on every PR and on pushes to main.
# All six jobs are required to pass (configure as required checks in branch
# protection). Tooling config and the dependency manifest both live in
# pyproject.toml; dev/test tooling is the `dev` dependency-group. `uv sync
# --locked` fails if uv.lock has drifted from pyproject.toml, so a dependency
# change without a lock refresh cannot merge.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# A push supersedes the previous run on the same ref — finishing the old run's
# six jobs is pure waste, so cancel it. Pushes to main keep running to
# completion (a cancelled main run would leave a commit with no green record).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: iceberg_ebs
          POSTGRES_USER: iceberg_ebs
          POSTGRES_PASSWORD: iceberg_ebs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U iceberg_ebs -d iceberg_ebs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ICEBERG_EBS_TEST_DATABASE_URL: postgresql+asyncpg://iceberg_ebs:iceberg_ebs@localhost:5432/iceberg_ebs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # zizmor artipacked: don't leave the repo token in .git/config —
          # nothing in this job pushes.
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --locked
      # --durations keeps the slowest tests visible in the log so a suite-runtime
      # regression is caught by inspection rather than by the timeout.
      - run: uv run pytest -q --durations=10

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # zizmor artipacked: don't leave the repo token in .git/config —
          # nothing in this job pushes.
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      # Named check so a stale lockfile fails with an obvious signal rather than
      # surfacing as a confusing sync error further down.
      - run: uv lock --check
      - run: uv sync --locked
      - run: uv run ruff check app tests e2e
      - run: uv run ruff format --check app tests alembic e2e
      # Dead-code gate (#101). Run via uvx (version-pinned) rather than the dev group:
      # adding vulture to the group would need a uv.lock refresh, and — like zizmor —
      # it's a standalone linter. Config + whitelist live in pyproject.toml.
      - run: uvx vulture@2.16
      # Tailwind build gate (#85): fail fast on an input.css/@source error instead of
      # surfacing it as a slow, confusing `ui` job image-build failure. output.css is
      # a gitignored artifact — this build is discarded. TAILWINDCSS_VERSION pins the
      # standalone CLI binary; keep in lockstep with the Makefile and Dockerfile.
      - run: uv run tailwindcss -i static/css/input.css -o static/css/output.css --minify
        env:
          TAILWINDCSS_VERSION: v4.3.1

  types:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # zizmor artipacked: don't leave the repo token in .git/config —
          # nothing in this job pushes.
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      # mypy needs the app's deps importable (and the pydantic plugin).
      - run: uv sync --locked
      - run: uv run mypy app

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # zizmor artipacked: don't leave the repo token in .git/config —
          # nothing in this job pushes.
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run bandit -c pyproject.toml -r app
      # Audit the exact runtime set the production image installs: the lockfile
      # exported without the dev group. If an unfixable upstream advisory ever
      # blocks CI, add `--ignore-vuln <ID>` here with a comment explaining why.
      - name: Audit the locked production dependency set
        run: |
          uv export --frozen --no-dev --no-emit-project --no-hashes \
            --format requirements-txt -o "${RUNNER_TEMP}/requirements-prod.txt"
          uv run pip-audit -r "${RUNNER_TEMP}/requirements-prod.txt"

  # Lints the workflow files themselves so the SHA-pinning / least-privilege
  # posture (#96) cannot silently regress. Both tools are blocking.
  lint-workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      # zizmor: CI/CD security audit (unpinned actions, artipacked, template
      # injection, excessive permissions). Pinned to an exact version; GH_TOKEN
      # turns on its online audits (impostor commits, known-vulnerable actions).
      - name: zizmor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uvx zizmor@1.27.0 .github/workflows/
      # actionlint: syntax + shellcheck over every run: block. Installed from the
      # Go module proxy at a pinned version and verified by Go's checksum database
      # (sum.golang.org) rather than trusting a third-party action — one less thing
      # to trust. ubuntu-latest ships Go and shellcheck; the auto-toolchain fetches
      # the Go version actionlint requires.
      - name: actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          "$(go env GOPATH)/bin/actionlint" -color

  # Browser-level UI smoke (#100): boots the real stack (Postgres + uvicorn behind
  # Renders the Helm chart. Nothing in CI used to render or install it, which is
  # exactly how #276 shipped: the Deployment referenced a Secret and a Service that
  # the Bitnami subchart never creates (subcharts name resources with their OWN chart
  # name), so the app pod could only ever have died in CreateContainerConfigError.
  # Reading the templates cannot catch that; rendering them can.
  #
  # tests/test_helm_postgres.py guards the same contract as text inside the `test`
  # job — this job proves the chart actually renders, including the external-database
  # path and the deliberate render failure when neither DSN knob is set.
  helm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # zizmor artipacked: don't leave the repo token in .git/config —
          # nothing in this job pushes.
          persist-credentials: false
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.16.3
      # No `helm dependency update` step: the chart has no subcharts since #276,
      # so this job needs no chart registry at all.
      - run: helm lint helm/iceberg-ebs --set image.tag=v0.0.0-ci --set icebergEbs.adminPassword=x --set icebergEbs.secretKey=y --set postgresql.auth.password=z

      # The bundled path: the DB Secret and host the pod is wired to must be names
      # the subchart actually creates.
      - name: Render with the bundled database and check the wiring resolves
        run: |
          helm template ci helm/iceberg-ebs \
            --set image.tag=v0.0.0-ci \
            --set icebergEbs.adminPassword=x --set icebergEbs.secretKey=y \
            --set postgresql.auth.password=z > /tmp/bundled.yaml

          # Every name the app pod's DB env refers to must be a name the chart
          # actually creates, and every selector must actually select the DB pods.
          python3 - <<'PY'
          import re, yaml
          docs = [d for d in yaml.safe_load_all(open("/tmp/bundled.yaml")) if d]
          created = {(d["kind"], d["metadata"]["name"]) for d in docs}
          dep = next(d for d in docs if d["kind"] == "Deployment")
          app = next(c for c in dep["spec"]["template"]["spec"]["containers"] if c["name"] == "iceberg-ebs")
          env = {e["name"]: e for e in app["env"]}

          secret = env["POSTGRES_PASSWORD"]["valueFrom"]["secretKeyRef"]["name"]
          assert ("Secret", secret) in created, f"pod reads Secret {secret!r}, which the chart never creates"

          dsn = env["ICEBERG_EBS_DATABASE_URL"]["value"]
          host = re.search(r"@([^/:]+)", dsn).group(1)
          assert ("Service", host) in created, f"DSN host {host!r} resolves to no Service in this release"

          # A Service or NetworkPolicy whose selector matches nothing is silently
          # inert: the app cannot connect, or Postgres is left unprotected.
          sts = next(d for d in docs if d["kind"] == "StatefulSet")
          pod_labels = sts["spec"]["template"]["metadata"]["labels"]
          svc = next(d for d in docs if d["kind"] == "Service" and d["metadata"]["name"] == host)
          assert svc["spec"]["selector"].items() <= pod_labels.items(), \
              f"Service {host!r} selector {svc['spec']['selector']} matches no DB pod"
          np = next(d for d in docs if d["kind"] == "NetworkPolicy"
                    and d["metadata"]["name"].endswith("allow-postgres-from-app"))
          assert np["spec"]["podSelector"]["matchLabels"].items() <= pod_labels.items(), \
              "allow-postgres-from-app selects no DB pod — Postgres would be unprotected"

          image = sts["spec"]["template"]["spec"]["containers"][0]["image"]
          print(f"OK: Secret {secret}, Service {host}, selectors match, image {image}")
          PY

      # The documented external-database path must actually suppress the subchart.
      - name: Render with an external database
        run: |
          helm template ci helm/iceberg-ebs \
            --set image.tag=v0.0.0-ci \
            --set icebergEbs.adminPassword=x --set icebergEbs.secretKey=y \
            --set postgresql.enabled=false \
            --set externalDatabase.url='postgresql+asyncpg://u:p@db.example.com:5432/iceberg_ebs' \
            > /tmp/external.yaml
          if grep -q "ci-postgresql" /tmp/external.yaml; then
            echo "postgresql.enabled=false still deployed the subchart" >&2
            exit 1
          fi
          # The DSN carries a password: it must come from a Secret, never a plaintext value.
          grep -q "key: database-url" /tmp/external.yaml

      # The upgrade guard (#276) cannot be tested by rendering the chart normally:
      # `lookup` returns empty without a cluster. Substitute a fixture for it and
      # assert the actual branch behaviour — a StatefulSet without the chart's
      # marker label must refuse, including one whose image name carries no
      # "bitnami" substring (an air-gapped mirror), which is exactly the case a
      # string sniff would wave through.
      - name: Upgrade guard refuses a foreign StatefulSet
        run: |
          set -euo pipefail
          WORK="${RUNNER_TEMP:-/tmp}/guard"
          LOOKUP='{{- $existing := lookup "apps/v1" "StatefulSet" .Release.Namespace (include "iceberg-ebs.postgresql.fullname" .) -}}'

          # Setup failures must never be reported as guard results. Each step here
          # runs at top level so `set -e` aborts on a broken harness, instead of an
          # empty render being read as "the guard did not fire".
          render_with() {   # $1 = replacement for the lookup line; writes $WORK/out
            rm -rf "$WORK"
            cp -r helm/iceberg-ebs "$WORK"
            python3 - "$WORK/templates/postgres.yaml" "$LOOKUP" "$1" <<'PY'
          import pathlib, sys
          p = pathlib.Path(sys.argv[1]); t = p.read_text()
          if sys.argv[2] not in t:
              sys.exit("guard lookup line not found — did templates/postgres.yaml change?")
          p.write_text(t.replace(sys.argv[2], sys.argv[3]))
          PY
            # helm exits non-zero when `fail` fires; that is the expected path here,
            # so capture the output and let the assertions below judge it.
            helm template ci "$WORK" --set image.tag=v0.0.0-ci \
              --set icebergEbs.adminPassword=x --set icebergEbs.secretKey=y \
              --set postgresql.auth.password=z > "$WORK/out" 2>&1 || true
            test -s "$WORK/out"   # empty output means the harness broke, not a verdict
          }

          for fixture in \
            '{{- $existing := dict "metadata" (dict "labels" (dict "app.kubernetes.io/name" "postgresql")) -}}' \
            '{{- $existing := dict "metadata" (dict "labels" (dict "app" "pg")) "spec" (dict "template" (dict "spec" (dict "containers" (list (dict "image" "registry.internal/pg:16"))))) -}}'
          do
            render_with "$fixture"
            grep -q "Refusing to upgrade" "$WORK/out" \
              || { echo "guard did NOT refuse a foreign StatefulSet: $fixture" >&2; cat "$WORK/out" >&2; exit 1; }
          done

          # ...and must NOT refuse our own, or every upgrade would be blocked.
          render_with '{{- $existing := dict "metadata" (dict "labels" (dict "icebergai.io/postgres-template" "iceberg-ebs")) -}}'
          grep -q "kind: StatefulSet" "$WORK/out" \
            || { echo "guard wrongly refused the chart's own StatefulSet" >&2; cat "$WORK/out" >&2; exit 1; }
          echo "upgrade guard: refuses foreign StatefulSets (incl. mirrored images), allows its own"

      - name: Render must fail when no external DSN is supplied
        run: |
          if helm template ci helm/iceberg-ebs \
               --set image.tag=v0.0.0-ci \
               --set icebergEbs.adminPassword=x --set icebergEbs.secretKey=y \
               --set postgresql.enabled=false 2>/dev/null; then
            echo "expected the render to fail with no externalDatabase.url and no existingSecret" >&2
            exit 1
          fi

  # the Caddy edge proxy) and drives it with Playwright, so a CSP
  # violation — e.g. the hand-maintained inline-script hash drifting — or a broken
  # Alpine component fails CI. The API/unit suite can see none of that. Playwright is
  # installed into a throwaway venv, not the dev group: like zizmor/vulture it's a
  # standalone tool, so it needs no uv.lock entry (and can't get one here — uv.lock's
  # Python 3.14 pin isn't required just to run a browser against the running stack).
  ui:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      # Throwaway credentials for the ephemeral CI stack only — not secrets.
      POSTGRES_PASSWORD: ci_postgres_pw
      ICEBERG_EBS_ADMIN_USERNAME: admin
      ICEBERG_EBS_ADMIN_PASSWORD: ci-admin-password
      ICEBERG_EBS_SECRET_KEY: ci-secret-key-not-a-real-secret-32chars
      BASE_URL: https://localhost
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Generate self-signed dev cert
        run: bash caddy/generate-dev-cert.sh
      - name: Write .env for the stack
        run: |
          {
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
            echo "ICEBERG_EBS_ADMIN_USERNAME=${ICEBERG_EBS_ADMIN_USERNAME}"
            echo "ICEBERG_EBS_ADMIN_PASSWORD=${ICEBERG_EBS_ADMIN_PASSWORD}"
            echo "ICEBERG_EBS_SECRET_KEY=${ICEBERG_EBS_SECRET_KEY}"
            echo "ICEBERG_EBS_APP_BASE_URL=${BASE_URL}"
          } > .env
      - name: Start the stack
        run: docker compose up -d --build
      # Installed while the detached stack is still booting (Postgres init +
      # migrations + Caddy), so the ~2 min of pip + browser download overlaps the
      # boot instead of adding to it — the readiness wait below runs after.
      - name: Install Playwright + Chromium (ephemeral, outside uv.lock)
        # Pinned to reviewed versions (like uvx vulture@/zizmor@) so the runner
        # toolchain is reproducible; bump alongside a Chromium refresh.
        run: |
          python3 -m venv "${RUNNER_TEMP}/e2e"
          "${RUNNER_TEMP}/e2e/bin/pip" install --quiet 'pytest==8.3.4' 'pytest-playwright==0.8.0' 'playwright==1.61.0'
          "${RUNNER_TEMP}/e2e/bin/playwright" install --with-deps chromium
      - name: Wait for the app behind caddy
        run: |
          for _ in $(seq 1 60); do
            if curl -ksSf "${BASE_URL}/login" >/dev/null 2>&1; then echo "stack up"; exit 0; fi
            sleep 5
          done
          echo "stack did not become ready" >&2
          docker compose logs
          exit 1
      - name: Run UI smoke
        run: |
          "${RUNNER_TEMP}/e2e/bin/pytest" e2e/ -v
      - name: Dump stack logs on failure
        if: failure()
        run: docker compose logs
      - name: Tear down
        if: always()
        run: docker compose down -v
