# TEMPORARY workflow: one-shot milestone re-triage (beta-release milestones).
# Runs on push to the triage branch only; removed once the triage has run.
name: Milestone triage (temporary)

on:
  push:
    branches:
      - claude/github-issues-triage-wjmw8t

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Re-triage milestones
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          existing=$(gh api "repos/$REPO/milestones?state=all&per_page=100")

          get_or_create() {
            local title="$1" desc="$2" n
            n=$(jq -r --arg t "$title" '[.[] | select(.title==$t)][0].number // empty' <<<"$existing")
            if [ -z "$n" ]; then
              n=$(gh api "repos/$REPO/milestones" -f title="$title" -f description="$desc" --jq .number)
              echo "created milestone '$title' (#$n)" >&2
            else
              echo "milestone '$title' already exists (#$n)" >&2
            fi
            echo "$n"
          }

          B1=$(get_or_create "v0.1.0-beta.1" "First beta. Retro-tagged with the previously-milestoned work already shipped, plus the remaining bug/docs fixes to land before tagging v0.1.0-beta.1.")
          B2=$(get_or_create "v0.2.0-beta.1" "SOC detection core: update diffing (capability_change), malicious-extension threat feeds, triage workflow + allow/deny-list overrides, outbound egress-proxy support.")
          B3=$(get_or_create "v0.3.0-beta.1" "Identity & governance: SSO (OIDC then SAML), RBAC roles, audit log of mutating actions, TOTP MFA for break-glass accounts.")
          B4=$(get_or_create "v0.4.0-beta.1" "Integrations & reporting: versioned API/OpenAPI for SOAR, Slack/Teams/email + Jira/ServiceNow destinations, SIEM export (OCSF/STIX), posture reporting + scheduled digest, Firefox AMO coverage.")
          WD=$(get_or_create "Won't do" "Triaged out — closed as not planned. Reopen if priorities change.")

          assign() {
            gh api -X PATCH "repos/$REPO/issues/$1" -F milestone="$2" > /dev/null
            echo "  #$1 -> milestone $2"
          }

          echo "== v0.1.0-beta.1 =="
          # open bugs/docs for the first beta
          for i in 79 151 153 156 214; do assign "$i" "$B1"; done
          # closed issues losing their Phase/Parity milestone — all shipped in beta.1
          for i in 22 23 24 25 26 27 28 29 66 67 84 85 86 87 88 89 90 91 92 93 94 95 96 97 98 99 100 101 102 103 104 105 106 107 108 109; do
            assign "$i" "$B1"
          done

          echo "== v0.2.0-beta.1 =="
          for i in 30 31 39 216; do assign "$i" "$B2"; done

          echo "== v0.3.0-beta.1 =="
          for i in 32 33 34 35; do assign "$i" "$B3"; done

          echo "== v0.4.0-beta.1 =="
          for i in 36 37 38 40 43; do assign "$i" "$B4"; done

          echo "== Won't do =="
          close_wd() {
            gh api -X PATCH "repos/$REPO/issues/$1" -F milestone="$WD" -f state=closed -f state_reason=not_planned > /dev/null
            gh api "repos/$REPO/issues/$1/comments" -f body="$2" > /dev/null
            echo "  #$1 closed as not planned"
          }
          close_wd 41 "Triaged as **Won't do**: the deliberate design for threat intel is manual VirusTotal/OTX deep-links only — automated enrichment would add API-key/quota management and score coupling for marginal benefit. Reopen if priorities change."
          close_wd 42 "Triaged as **Won't do**: a per-org policy editor for scoring weights is a large config surface for marginal benefit over the fixed heuristic. Reopen if priorities change."
          close_wd 171 "Triaged as **Won't do** (as a standing issue): the finding itself says the parameter object is only worth doing when the next scoring signal is added — it can be handled in that future PR rather than tracked here. Reopen if that lands."

          echo "== Deleting old Phase/Parity milestones =="
          jq -r '.[] | select(.title|test("^(Phase|Parity) ")) | "\(.number)\t\(.title)"' <<<"$existing" |
          while IFS="$(printf '\t')" read -r n t; do
            gh api -X DELETE "repos/$REPO/milestones/$n"
            echo "  deleted milestone #$n: $t"
          done

          echo "== Final milestone list =="
          gh api "repos/$REPO/milestones?state=all&per_page=100" \
            --jq '.[] | "  #\(.number) \(.title) — \(.open_issues) open / \(.closed_issues) closed"'
