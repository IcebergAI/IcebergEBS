user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    gzip            on;
    gzip_vary       on;
    gzip_types      text/plain text/css application/json application/javascript text/javascript;

    client_max_body_size 2m;

    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m   rate=60r/m;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Uncomment for production CA-issued certs only (not self-signed):
        # ssl_stapling on;
        # ssl_stapling_verify on;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # Overwrite (don't append) X-Forwarded-For with the real client IP. uvicorn
        # runs with --forwarded-allow-ips=* and trusts the last hop, so appending
        # ($proxy_add_x_forwarded_for) would let a client spoof its IP via an inbound
        # XFF header and evade the app-level login rate limiter (#77).
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    10s;
        proxy_read_timeout    120s;

        # Static assets served directly by nginx
        location /static/ {
            alias /app/static/;
            expires 1y;
            include /etc/nginx/security_headers.conf;
            add_header Cache-Control "public, immutable" always;
        }

        # Login — tight rate limit (5 req/min, burst 5)
        location = /login {
            limit_req zone=login burst=5 nodelay;
            include /etc/nginx/security_headers.conf;
            proxy_pass http://app:8000;
        }

        # API — moderate rate limit (60 req/min, burst 20)
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            include /etc/nginx/security_headers.conf;
            proxy_pass http://app:8000;
        }

        location / {
            include /etc/nginx/security_headers.conf;
            proxy_pass http://app:8000;
        }
    }
}
